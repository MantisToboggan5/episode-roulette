<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#151320" />
<title>Episode Roulette</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon.svg" />
<link rel="stylesheet" href="css/styles.css?v=10" />
</head>
<body>
<div id="app">

  <header class="topbar">
    <h1>Episode Roulette</h1>
  </header>

  <main id="main">

    <section id="view-main" class="view">
      <div id="bias-control" class="bias-control">
        <label for="bias-slider">Spin bias: <span id="bias-label">True Random</span></label>
        <input id="bias-slider" type="range" min="0" max="5" step="1" value="0" />
      </div>
      <button id="surprise-btn" class="primary-btn">🎲 Surprise Me</button>
      <div class="search-bar">
        <input id="search-input" type="search" placeholder="Filter shows…" autocomplete="off" />
      </div>
      <ul id="shows-list" class="card-list"></ul>
      <p id="shows-empty" class="empty-hint hidden">No shows ingested yet. Ask Claude to add some.</p>
    </section>

    <section id="view-result" class="view hidden">
      <div id="result-card" class="result-card">
        <div id="spin-indicator" class="spin-indicator hidden">
          <div class="spinner"></div>
          <p>Picking an episode…</p>
        </div>
        <div id="result-content" class="result-content hidden">
          <img id="result-still" class="result-still" alt="" />
          <div class="result-body">
            <p id="result-show-name" class="result-show-name"></p>
            <div id="result-epnum" class="result-epnum">
              <span id="result-season-chip"></span>
              <span id="result-episode-chip"></span>
            </div>
            <h2 id="result-episode-title"></h2>
            <p id="result-episode-meta"></p>
            <p id="result-rating" class="result-rating hidden"></p>
            <p id="result-overview" class="result-overview"></p>
            <div id="result-chart" class="result-chart"></div>
          </div>
        </div>
        <div id="result-caught-up" class="result-caught-up hidden">
          <p id="caught-up-message"></p>
          <button id="reset-watched-btn" class="primary-btn">Start Over</button>
        </div>
      </div>
      <div id="result-actions" class="result-actions hidden">
        <button id="mark-watched-btn" class="action-btn">✓ Mark Watched</button>
        <button id="reroll-btn" class="action-btn">🔄 Reroll</button>
        <button id="back-btn" class="action-btn">← Back</button>
      </div>
      <div class="ad-slot" aria-hidden="true"></div>
    </section>

  </main>

</div>

<script src="js/catalog.js?v=10"></script>
<script src="js/storage.js?v=10"></script>
<script src="js/chart.js?v=10"></script>
<script src="js/app.js?v=10"></script>
</body>
</html>
